<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Selindell - 造物</title>
    <style>
        /* 1. 基础布局复刻截图风格 */
        body { margin: 0; background-color: #fcfcfc; font-family: sans-serif; }
        
        .selindell-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        /* 2. 标题区 */
        .badge {
            background: #f3e8ff; color: #a855f7;
            padding: 4px 15px; border-radius: 20px;
            font-size: 13px; display: inline-block; margin-bottom: 10px;
        }
        .main-title {
            font-size: 56px; font-weight: 800; margin: 0 0 30px 0;
            letter-spacing: -1px; color: #1a1a1a;
        }
        .main-title span { color: #a855f7; }

        /* 3. 核心：Hero 海报显示区 */
        .hero-wrapper {
            width: 100%;
            background: #000; /* 海报背景是黑的，用黑底防止白边 */
            border-radius: 32px; /* 大圆角复刻高级感 */
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            margin-bottom: -60px; /* 故意让图片下沉，让后面的输入框浮上来 */
        }

        .hero-img {
            width: 100%;
            height: auto;
            display: block; /* 解决图片下方空隙 */
            transition: transform 0.6s ease;
        }
        .hero-img:hover { transform: scale(1.01); }

        /* 4. 输入框区域（压在图片上） */
        .input-card {
            position: relative;
            z-index: 10;
            background: #e9eff6; /* 截图里的浅灰蓝背景 */
            border-radius: 40px;
            padding: 60px 40px;
            width: 90%;
            margin: 0 auto;
            border: 8px solid #fff; /* 模拟白边描边感 */
        }
        .placeholder-text {
            font-size: 24px;
            color: #64748b;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="selindell-page">
        <div class="badge">人人都是造物主</div>
        <h1 class="main-title">selindell <span>造物</span></h1>

        <div class="hero-wrapper">
            <img src="https://你的项目名.vercel.app/hero.png" class="hero-img" alt="Selindell Hero Poster">
        </div>

        <div class="input-card">
            <div class="placeholder-text">在这里写下您想要的手办样子...</div>
            </div>
    </div>

</body>
</html>
